output_dir = "outputs/agent_diff_mistral_rl"
max_steps = 100
max_async_level = 1
seq_len = 16384

[ckpt]
interval = 3

[deployment]
num_train_gpus = 1
num_infer_gpus = 1

[model]
name = "outputs/Ministral-3-14B-Agent-Diff-SFT-merged"

[wandb]
project = "agent-diff"
name = "ministral-3-agent-diff-rl"

[orchestrator.client]
base_url = ["http://127.0.0.1:8010/v1"]

[inference]
gpu_memory_utilization = 0.8
vllm_extra = { attention_backend = "FLASH_ATTN", tokenizer_mode = "mistral", tokenizer = "mistralai/Ministral-3-14B-Instruct-2512-BF16", language_model_only = true }

[inference.server]
port = 8010

[inference.model]
dtype = "bfloat16"
enforce_eager = true
max_model_len = 16384
tool_call_parser = "mistral"

[trainer.optim]
lr = 1e-5
weight_decay = 0.0

[trainer.model]
optimization_dtype = "bfloat16"
reduce_dtype = "bfloat16"

[trainer.tokenizer]
name = "mistralai/Ministral-3-14B-Instruct-2512-BF16"

[trainer.model.lora]
rank = 64
alpha = 128
dropout = 0.05
target_modules = [
    "q_proj",
    "k_proj",
    "v_proj",
    "o_proj",
    "gate_proj",
    "up_proj",
    "down_proj"
]

[trainer.ckpt.weights]
save_adapter_separately = true

[orchestrator]
batch_size = 256
rollouts_per_example = 8
oversampling_factor = 1.5
use_token_client = false

[orchestrator.model.lora]
name = "ministral-3-agent-diff"

[orchestrator.sampling]
max_tokens = 4096
temperature = 0.8

[[orchestrator.env]]
id = "hubert-marek/agent-diff-bench"
args = { service = "slack,linear", task_horizon = 8, tool_efficiency_weight = 0.2, max_turns = 30 }

[orchestrator.eval]
interval = 10
rollouts_per_example = 1

[[orchestrator.eval.env]]
id = "hubert-marek/agent-diff-bench"
args = { service = "slack,linear", task_horizon = 8, tool_efficiency_weight = 0.2, max_turns = 30 }
num_examples = -1
